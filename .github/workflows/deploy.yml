name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build worker
        run: |
          mkdir -p dist/static
          cp -r public/static/. dist/static/ 2>/dev/null || true
          npx esbuild src/index.tsx \
            --bundle \
            --outfile=dist/_worker.js \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --external:node:* \
            --define:process.env.NODE_ENV='"production"' \
            --minify-syntax \
            --minify-whitespace

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=india-gully --branch=main
